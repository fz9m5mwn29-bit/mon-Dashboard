<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mon Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-image: url(belleimage.jpg);
      background-size: cover;
      background-position: center 10%;
      font-family: Arial, sans-serif;
    }

    nav {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 15px 30px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    nav a {
      text-align: center;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover { color: white; }

    #horloge {
      position: absolute;
      top: 50px;
      right: 10px;
      color: white;
      font-size: 50px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
    }
    #temperature {
        position: absolute;
        top : 110px;
        right: 10px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 30px;
    }
    #temps {
        position: absolute;
        top : 150px;
        right: 10px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 30px;
    }
    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: white;
      text-shadow: 2px 2px 8px black;
      font-size: 40px;
    }

    .input-zone {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button.ajouter {
      padding: 12px 20px;
      background-color: #00b020ad;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    ul { list-style: none; padding: 0; }

    ul li {
      background-color: rgba(0, 0, 0, 0.4);
      border: 2px solid black;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    ul li button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
  <script>
    let taches = JSON.parse(localStorage.getItem('taches')) || [];

    window.onload = function() {
      let liste = document.getElementById('listeTaches');
      taches.forEach(function(texte) {
        let item = document.createElement('li');
        item.innerHTML = texte;
        let bouton = document.createElement('button');
        bouton.innerHTML = '❌';
        bouton.onclick = function() {
          taches = taches.filter(t => t !== texte);
          localStorage.setItem('taches', JSON.stringify(taches));
          item.remove();
        };
        item.appendChild(bouton);
        liste.appendChild(item);
        });
    
         fetch('https://api.open-meteo.com/v1/forecast?latitude=49.1&longitude=6.16&current_weather=true')
        .then(response => response.json())
        .then(data => {
            // temperature toujours affiché
            // weathercode toujours affiché
            let description = '';
            const code = data.current_weather.weathercode;
            if (code === 0) {
              description = 'Ciel bleu ☀️';
            } else if (code === 1 || code === 2 || code === 3) {
              description = 'Nuageux ⛅️';
            } else if (code === 61 || code === 63 || code === 65) {
              description = 'Pluie 🌧️';
            } else if (code === 71 || code === 73 || code === 75) {
              description = 'Neige ❄️';
            } else if (code === 95) {
              description = 'Orage ⚡️';
            } else {
              description = 'Inconnu';
            }
            document.getElementById('temperature').innerText = data.current_weather.temperature + '°C';
            document.getElementById('temps').innerText = description;
        });
    }

    function ajouterTache() {
      let texte = document.getElementById('nouvelleTache').value;
      if (texte === '') return;
      taches.push(texte);
      localStorage.setItem('taches', JSON.stringify(taches));
      let liste = document.getElementById('listeTaches');
      let item = document.createElement('li');
      item.innerHTML = texte;
      let bouton = document.createElement('button');
      bouton.innerHTML = '❌';
      bouton.onclick = function() {
        taches = taches.filter(t => t !== texte);
        localStorage.setItem('taches', JSON.stringify(taches));
        item.remove();
      };
      item.appendChild(bouton);
      liste.appendChild(item);
      document.getElementById('nouvelleTache').value = '';
    }

    function mettreAJourHorloge() {
      let maintenant = new Date();
      let heures = maintenant.getHours();
      let minutes = maintenant.getMinutes();
      let secondes = maintenant.getSeconds();
      document.getElementById('horloge').innerHTML = heures + ':' + minutes + ':' + secondes;
    }

    setInterval(mettreAJourHorloge, 1000);
</script>
</head>
<body>

  <nav>
    <a href="https://gmail.com" target="_blank">Gmail</a>
    <a href="https://youtube.com" target="_blank">YouTube</a>
    <a href="https://www.youtube.com/channel/UCYnvxJ-PKiGXo_tYXpWAC-w" target="_blank">Micode</a>
    <a href="https://www.netflix.com" target="_blank">Netflix</a>
    <a href="https://nakastream.tv" target="_blank">NakaStream</a>
    <a href="sms:" target="_blank">Messages</a>
    <a href="https://www.disneyplus.com/fr-fr/home" target="_blank">Disney+</a>
    <a href="notes.html" target="_blank">Notes </a>
  </nav>

  <div id="horloge"></div>

  <p id="temperature"></p>
  <p id="temps"></p>

  <div class="container">
    <h1>✅ Mes tâches</h1>
    <div class="input-zone">
      <input id="nouvelleTache" type="text" placeholder="Ecris une tâche...">
      <button class="ajouter" onclick="ajouterTache()">+</button>
    </div>
    <ul id="listeTaches"></ul>
  </div>

</body>
</html>
